services:
  # The API itself. Build + run everything with:  docker compose up --build
  # (Omit this service and run `npm run dev` on the host if you prefer hot reload.)
  api:
    build: .
    container_name: customer-portal-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    env_file:
      - .env
    environment:
      # Inside the compose network these services are reached by their service
      # names, not localhost — these override .env for the container only.
      DB_HOST: db
      SMTP_HOST: mailpit
      NODE_ENV: production
    ports:
      - '${PORT:-3000}:3000'

  db:
    image: postgres:16-alpine
    container_name: customer-portal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-customer_portal}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional — only needed when CACHE_DRIVER=redis. Start with:
  #   docker compose --profile redis up -d
  redis:
    image: redis:7-alpine
    container_name: customer-portal-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    profiles: ['redis']

  # A fake SMTP server with a web inbox. Included by default (not behind a
  # profile) so EMAIL_DRIVER=smtp works out of the box and the order emails can
  # be seen actually arriving rather than only logged — no account, no internet.
  # Inbox: http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    container_name: customer-portal-mailpit
    restart: unless-stopped
    ports:
      - '8025:8025' # web inbox
      - '1025:1025' # SMTP

  # Optional — a web UI for the API's logs, as an alternative to
  # `docker compose logs -f api`. Read-only, and never exposed by the API
  # itself: logs are operator data, not an API surface. Start with:
  #   docker compose --profile logs up -d
  # Viewer: http://localhost:8080
  dozzle:
    image: amir20/dozzle:latest
    container_name: customer-portal-logs
    restart: unless-stopped
    environment:
      DOZZLE_NO_ANALYTICS: 'true'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - '8080:8080'
    profiles: ['logs']

volumes:
  pgdata:
